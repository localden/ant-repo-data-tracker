name: Aggregate Repository Data

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: aggregate-data
  cancel-in-progress: false

jobs:
  github:
    name: GitHub metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - name: Scrape GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run aggregate -- --only=github
      - uses: actions/upload-artifact@v4
        with:
          name: github-data
          path: data/
          retention-days: 1

  npm:
    name: npm downloads
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm run aggregate -- --only=downloads --registry=npm
      - uses: actions/upload-artifact@v4
        with:
          name: downloads-npm
          path: |
            data/repos/**/downloads.json
            data/repos/**/versions.json
          retention-days: 1
          if-no-files-found: ignore

  nuget:
    name: nuget downloads
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm run aggregate -- --only=downloads --registry=nuget
      - uses: actions/upload-artifact@v4
        with:
          name: downloads-nuget
          path: |
            data/repos/**/downloads.json
            data/repos/**/versions.json
          retention-days: 1
          if-no-files-found: ignore

  rubygems:
    name: rubygems downloads
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm run aggregate -- --only=downloads --registry=rubygems
      - uses: actions/upload-artifact@v4
        with:
          name: downloads-rubygems
          path: data/repos/**/downloads.json
          retention-days: 1
          if-no-files-found: ignore

  packagist:
    name: packagist downloads
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm run aggregate -- --only=downloads --registry=packagist
      - uses: actions/upload-artifact@v4
        with:
          name: downloads-packagist
          path: data/repos/**/downloads.json
          retention-days: 1
          if-no-files-found: ignore

  pypi:
    name: pypi downloads
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - name: Write BigQuery credentials
        run: |
          echo '${{ secrets.BQ_KEY }}' > /tmp/bq-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/bq-key.json" >> $GITHUB_ENV
      - run: npm run aggregate -- --only=bigquery
      - uses: actions/upload-artifact@v4
        with:
          name: downloads-pypi
          path: |
            data/repos/**/versions.json
            data/repos/**/downloads.json
          retention-days: 1
          if-no-files-found: ignore

  commit:
    name: Merge & commit
    runs-on: ubuntu-latest
    needs: [github, npm, nuget, rubygems, packagist, pypi]
    if: always() && needs.github.result == 'success'
    outputs:
      changes: ${{ steps.commit.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge artifacts into data/
        run: |
          # github-data is the full skeleton (metrics, snapshots, contributors)
          rsync -a artifacts/github-data/ data/

          today=$(date -u +%Y-%m-%d)

          # Patch downloads.json sidecars into metrics + today's snapshot.
          # upload-artifact strips everything before the first glob wildcard, so
          # the artifact root is <owner>/<repo>/... — re-add the data/repos/ prefix.
          for art in artifacts/downloads-*; do
            [ -d "$art" ] || continue
            find "$art" -name downloads.json | while read -r dl; do
              rel=${dl#$art/}
              dir=data/repos/${rel%/downloads.json}
              metrics="$dir/metrics.json"
              snap="$dir/snapshots/$today.json"
              [ -f "$metrics" ] && jq --slurpfile d "$dl" '.downloads = $d[0]' "$metrics" > "$metrics.tmp" && mv "$metrics.tmp" "$metrics"
              [ -f "$snap" ]    && jq --slurpfile d "$dl" '.downloads = $d[0]' "$snap"    > "$snap.tmp"    && mv "$snap.tmp" "$snap"
            done
            find "$art" -name versions.json | while read -r vf; do
              rel=${vf#$art/}
              cp "$vf" "data/repos/${rel}"
            done
          done

      - name: Commit and push data changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update repository metrics data

          Automated data sync at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # -X theirs during rebase keeps OUR commit's version on conflict
            # (rebase inverts ours/theirs). Safe because we only stage data/
            # and just regenerated it — our copy is fresher than any concurrent
            # manual edit.
            for attempt in 1 2 3; do
              git pull --rebase -X theirs origin main
              git push && break
              [ $attempt -eq 3 ] && exit 1
              sleep 2
            done
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: commit
    if: needs.commit.outputs.changes == 'true'
    uses: ./.github/workflows/deploy.yml
